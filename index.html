<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expression Tree Generator</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
</head>

<body>
    <main class="app">
        <section class="controls" aria-label="Expression controls">
            <div class="input-wrap" id="input-wrap">
                <input type="text" id="expression-input" placeholder="sin(#add(a,b))*#\pi" autocomplete="off" spellcheck="false">
                <span class="warning" id="warning" aria-hidden="true" hidden>⚠️</span>
                <button class="icon-btn input-icon" id="clear-tree" aria-label="Clear expression">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                        <path d="M10 11v6"></path>
                        <path d="M14 11v6"></path>
                        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
                    </svg>
                </button>
            </div>

            <div class="error-message" id="error-message" role="alert" aria-live="polite" hidden></div>

            <details class="export-popover" id="export-popover">
                <summary class="icon-btn save-btn" id="export-tree" aria-label="Export options">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </summary>
                <div class="export-panel" role="group" aria-label="Export options">
                    <fieldset class="export-fieldset">
                        <legend>Format</legend>
                        <label><input type="radio" name="export-format" value="png" checked> PNG</label>
                        <label><input type="radio" name="export-format" value="svg"> SVG</label>
                    </fieldset>
                    <label class="scale-row" id="png-scale-row" for="png-scale">
                        <span>Scale</span>
                        <select id="png-scale">
                            <option value="1">1x</option>
                            <option value="2" selected>2x</option>
                            <option value="3">3x</option>
                            <option value="4">4x</option>
                        </select>
                    </label>
                    <button type="button" class="download-btn" id="download-export">Download</button>
                </div>
            </details>

        </section>

        <div id="canvas-container">
            <canvas></canvas>
        </div>

        <footer class="bottom-bar">
            <a href="https://github.com/psaegert/expression-tree-gen" aria-label="GitHub repository" class="icon-btn" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M12 .5C5.7.5.7 5.6.7 12c0 5.1 3.3 9.4 7.8 10.9.6.1.8-.3.8-.6v-2.3c-3.2.7-3.9-1.4-3.9-1.4-.5-1.4-1.3-1.8-1.3-1.8-1.1-.8.1-.8.1-.8 1.2.1 1.9 1.3 1.9 1.3 1.1 1.9 2.8 1.4 3.5 1.1.1-.8.4-1.4.8-1.8-2.5-.3-5.2-1.3-5.2-5.8 0-1.3.4-2.3 1.2-3.2-.1-.3-.5-1.5.1-3 0 0 1-.3 3.3 1.2 1-.3 2-.4 3-.4s2 .1 3 .4c2.3-1.6 3.3-1.2 3.3-1.2.6 1.5.2 2.7.1 3 .8.9 1.2 1.9 1.2 3.2 0 4.5-2.7 5.5-5.2 5.8.4.4.8 1.1.8 2.2v3.2c0 .3.2.7.8.6 4.5-1.5 7.8-5.8 7.8-10.9C23.3 5.6 18.3.5 12 .5z"></path>
                </svg>
            </a>
            <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark mode">
                <svg class="theme-icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="theme-icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
                </svg>
            </button>
        </footer>
    </main>

    <script defer src="tree.js"></script>
    <script defer src="infixToPostfix.js"></script>
    <script defer src="canvas.js"></script>
</body>

</html>
